<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker – Recurring</title>
    <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/darkmode.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <nav data-app-nav data-active="recurring" data-base-path="views"></nav>
  <script src="../js/components/navbar.js"></script>

  <div class="container">
    <h1>Recurring Transactions</h1>

    <!-- Recurring Signals -->
    <div class="recurring-signals" id="recurringSignals"></div>

    <div class="form-group">
      <select id="recurType" onchange="updateCatSrcLabel()">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
      <input id="recurAmount" placeholder="Amount (&#8377;)" type="number" min="0" step="0.01">
      <select id="recurCategory">
        <option value="">Select Category</option>
      </select>
      <input id="recurSource" placeholder="Source (e.g. Salary)" style="display:none;">
      <select id="recurFreq">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly" selected>Monthly</option>
      </select>
      <input id="recurStart" type="date">
      <select id="recurAccount"></select>
      <button onclick="addRecurring()">Add Recurring</button>
    </div>

    <div id="recurringList"></div>
  </div>

  <script src="../js/utils/utils.js"></script>
  <script src="../js/storage/storageAdapter.js"></script>
  <script src="../js/components/metricCard.js"></script>
  <script src="../js/components/sectionHeader.js"></script>
  <script src="../js/components/emptyState.js"></script>
  <script src="../js/components/chartCard.js"></script>
  <script src="../js/data/dataService.js"></script>
  <script src="../js/services/transactionService.js"></script>
  <script src="../js/services/appState.js"></script>
  <script src="../js/utils/formatters.js"></script>
  <script src="../js/templates/templates.js"></script>
  <script src="../js/cache/selectors.js"></script>
  <script src="../js/validation/validationCore.js"></script>
  <script src="../js/validation/amountValidator.js"></script>
  <script src="../js/validation/accountValidator.js"></script>
  <script src="../js/validation/lendingValidator.js"></script>
  <script src="../js/validation/calculatorValidator.js"></script>
  <script src="../js/storage/restApiAdapter.js"></script>
  <script src="../js/services/filterService.js"></script>
  <script src="../js/services/accountService.js"></script>
  <script src="../js/ui/recurring.js"></script>
</body>
</html>
